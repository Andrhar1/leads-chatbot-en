# ---------------------------------------------------------------------------
# Reverse proxy for leads-chatbot-en  (host Nginx -> Docker loopback ports)
# Install to: /etc/nginx/sites-available/leads.andrihari.my.id.conf
#   sudo ln -s /etc/nginx/sites-available/leads.andrihari.my.id.conf \
#              /etc/nginx/sites-enabled/leads.andrihari.my.id.conf
#
# TLS is terminated at Cloudflare (the domain is proxied / orange-cloud).
# Recommended Cloudflare SSL mode: "Full (strict)" with a Cloudflare Origin
# Certificate installed on this box (see deploy/README.md). With that in place,
# switch this block to `listen 443 ssl;` + ssl_certificate lines. Until then,
# Cloudflare can reach the origin over HTTP on port 80.
# ---------------------------------------------------------------------------

# Restore the visitor's real IP from Cloudflare (so logs/rate-limits are real).
# IPv4 ranges:
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
# IPv6 ranges:
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name leads.andrihari.my.id;

    # Generous cap for any future media; tune as needed.
    client_max_body_size 25m;

    # ---- Socket.io (WebSocket) ----  /api/socket.io/* -> backend /socket.io/*
    location /api/socket.io/ {
        proxy_pass http://127.0.0.1:4000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 3600s;
    }

    # ---- REST API ----  /api/* -> backend /*   (trailing slash strips /api)
    location /api/ {
        proxy_pass http://127.0.0.1:4000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # ---- Frontend (Next.js) ----  everything else -> frontend
    location / {
        proxy_pass http://127.0.0.1:3005;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }
}
