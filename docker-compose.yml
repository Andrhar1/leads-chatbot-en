services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: leads
    ports: ["5432:5432"]
  waha:
    # Tag :arm untuk Apple Silicon (image :latest hanya amd64).
    image: devlikeapro/waha:arm
    # Host 3002 (3000 & 3001 dipakai app lain di mesin dev). Container tetap 3000.
    ports: ["3002:3000"]
    environment:
      WHATSAPP_HOOK_URL: http://host.docker.internal:4000/webhook/waha
      WHATSAPP_HOOK_EVENTS: message.any
      # Kredensial tetap (dev) — agar tidak di-generate acak tiap restart.
      WAHA_API_KEY: leadsdevkey
      WAHA_DASHBOARD_USERNAME: admin
      WAHA_DASHBOARD_PASSWORD: admin
      WHATSAPP_SWAGGER_USERNAME: admin
      WHATSAPP_SWAGGER_PASSWORD: admin
